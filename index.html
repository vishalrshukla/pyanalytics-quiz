<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>🐍 PyAnalytics — AI Interview Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#1e293b}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── Layout ── */
#app{min-height:100vh;background:linear-gradient(160deg,#0f172a 0%,#1e1b4b 60%,#0f172a 100%);display:flex;flex-direction:column;align-items:center;padding-bottom:60px}
.hdr{width:100%;max-width:480px;padding:20px 20px 0;text-align:center}
.card{width:100%;max-width:480px;padding:0 16px}
.panel{background:rgba(30,41,59,0.85);backdrop-filter:blur(12px);border-radius:16px;border:1px solid rgba(99,102,241,0.18);padding:20px;margin-bottom:14px;animation:fadeIn 0.3s ease}
.logo{font-size:26px;font-weight:900;letter-spacing:-1px;background:linear-gradient(90deg,#22d3ee,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px}
.sub{font-size:11px;color:#64748b;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:14px}
.lbl{font-size:11px;font-weight:700;letter-spacing:0.1em;color:#64748b;text-transform:uppercase;display:block;margin-bottom:8px}

/* ── Controls ── */
select{width:100%;background:#1e293b;border:1px solid rgba(99,102,241,0.3);border-radius:10px;color:#e2e8f0;padding:10px 14px;font-size:14px;outline:none;margin-bottom:10px;cursor:pointer;font-family:inherit}
textarea{width:100%;background:#0a0f1e;border:1px solid rgba(99,102,241,0.2);border-radius:10px;color:#e2e8f0;padding:12px 14px;font-size:13px;font-family:'Fira Code',monospace;line-height:1.6;resize:vertical;min-height:110px;outline:none}
textarea:focus{border-color:#6366f1}
button{display:flex;align-items:center;justify-content:center;gap:6px;border-radius:10px;font-weight:700;font-size:14px;padding:11px 20px;cursor:pointer;width:100%;letter-spacing:0.02em;transition:opacity 0.15s;font-family:inherit}
button:hover{opacity:0.85}
button:disabled{opacity:0.45;cursor:not-allowed}
.btn-primary{background:#6366f1;border:none;color:#fff}
.btn-green{background:#10b981;border:none;color:#fff}
.btn-ghost-cyan{background:transparent;border:1.5px solid #22d3ee;color:#22d3ee}
.btn-ghost-green{background:transparent;border:1.5px solid #10b981;color:#10b981}
.btn-ghost-red{background:transparent;border:1.5px solid #ef4444;color:#ef4444}
.btn-ghost-gray{background:transparent;border:1.5px solid #475569;color:#475569}
.btn-ghost-cyan2{background:transparent;border:1.5px solid #22d3ee;color:#22d3ee}
.btn-row{display:flex;gap:8px}
.btn-row button{flex:1;width:auto}

/* ── Difficulty levels ── */
.lvl-btns{display:flex;gap:6px;margin-top:4px}
.lvl-btns button{flex:1;width:auto;padding:8px 6px;font-size:12px;border:1.5px solid transparent}
.lvl-easy{background:#10b981;border-color:#10b981;color:#fff}
.lvl-easy.ghost{background:transparent;color:#10b981}
.lvl-medium{background:#f59e0b;border-color:#f59e0b;color:#fff}
.lvl-medium.ghost{background:transparent;color:#f59e0b}
.lvl-hard{background:#ef4444;border-color:#ef4444;color:#fff}
.lvl-hard.ghost{background:transparent;color:#ef4444}
.lvl-expert{background:#8b5cf6;border-color:#8b5cf6;color:#fff}
.lvl-expert.ghost{background:transparent;color:#8b5cf6}

/* ── Heat bar ── */
.heat{display:flex;gap:4px;margin-bottom:14px}
.heat-seg{flex:1;height:4px;border-radius:4px;background:rgba(255,255,255,0.08);transition:all 0.4s}
.heat-seg.on-easy{background:#10b981;box-shadow:0 0 6px #10b98166}
.heat-seg.on-medium{background:#f59e0b;box-shadow:0 0 6px #f59e0b66}
.heat-seg.on-hard{background:#ef4444;box-shadow:0 0 6px #ef444466}
.heat-seg.on-expert{background:#8b5cf6;box-shadow:0 0 6px #8b5cf666}

/* ── Pills ── */
.pill{display:inline-block;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700}
.pill-green{background:#10b98122;border:1px solid #10b98155;color:#10b981}
.pill-yellow{background:#f59e0b22;border:1px solid #f59e0b55;color:#f59e0b}
.pill-red{background:#ef444422;border:1px solid #ef444455;color:#ef4444}
.pill-purple{background:#8b5cf622;border:1px solid #8b5cf655;color:#8b5cf6}
.pill-indigo{background:#6366f122;border:1px solid #6366f155;color:#818cf8;font-size:10px}

/* ── Code / Output ── */
pre.code-block{background:#0a0f1e;border:1px solid rgba(34,211,238,0.15);border-radius:10px;padding:14px;font-size:12px;font-family:'Fira Code',monospace;color:#a5f3fc;overflow-x:auto;white-space:pre-wrap;line-height:1.7;margin-top:8px}
.out-ok{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.3);border-radius:10px;padding:12px;font-size:12px;font-family:monospace;color:#6ee7b7;margin-top:8px;white-space:pre-wrap}
.out-err{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:12px;font-size:12px;font-family:monospace;color:#fca5a5;margin-top:8px;white-space:pre-wrap}
.hint-box{margin-top:10px;padding:8px 12px;background:rgba(99,102,241,0.08);border-radius:8px;font-size:12px;color:#818cf8}
.tip-box{background:rgba(251,191,36,0.07);border-radius:8px;padding:8px 12px;font-size:12px;color:#fbbf24;margin-top:10px}
.info-box{text-align:center;padding:10px 14px;background:rgba(99,102,241,0.08);border-radius:10px;font-size:13px;color:#a5b4fc}
.err-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:10px 14px;color:#fca5a5;font-size:12px;margin-bottom:14px}

/* ── Stats row ── */
.stats-row{display:flex;justify-content:space-around;text-align:center;padding:16px 20px}
.stat-num{font-size:22px;font-weight:800}
.stat-lbl{font-size:11px;color:#64748b}

/* ── Score bar chart ── */
.score-bars{display:flex;gap:4px;align-items:flex-end;height:48px;margin-top:6px}
.score-bar{flex:1;border-radius:3px;min-width:8px;opacity:0.85;transition:height 0.3s}

/* ── Spinner ── */
.spinner-wrap{text-align:center;padding:28px 0}
.spinner{width:34px;height:34px;border:3px solid rgba(99,102,241,0.2);border-top:3px solid #6366f1;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
.spinner-txt{color:#64748b;font-size:13px}

/* ── API overlay ── */
#overlay{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#0f172a 0%,#1e1b4b 60%,#0f172a 100%);display:flex;align-items:center;justify-content:center;padding:20px}
#api-box{background:rgba(30,41,59,0.95);border:1px solid rgba(99,102,241,0.3);border-radius:20px;padding:32px 24px;max-width:420px;width:100%;text-align:center}
#api-box h1{font-size:26px;font-weight:900;letter-spacing:-1px;background:linear-gradient(90deg,#22d3ee,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
#api-box p{color:#94a3b8;font-size:13px;margin-bottom:20px;line-height:1.6}
#api-key-input{width:100%;padding:12px 14px;background:#0f172a;border:1px solid rgba(99,102,241,0.35);border-radius:10px;color:#e2e8f0;font-size:13px;font-family:'Fira Code',monospace;outline:none;margin-bottom:12px}
#api-key-input:focus{border-color:#6366f1}
#api-start-btn{width:100%;padding:13px;background:#6366f1;border:none;border-radius:10px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
#api-start-btn:hover{opacity:0.88}
#api-note{font-size:11px;color:#475569;margin-top:14px;line-height:1.7}
#api-note a{color:#6366f1;text-decoration:none}
#api-err{color:#fca5a5;font-size:12px;margin-bottom:8px;display:none}

/* ── Back button ── */
.back-btn{background:none;border:none;color:#64748b;font-size:22px;cursor:pointer;width:auto;padding:0}

/* ── Quiz header row ── */
.quiz-hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.q-meta{display:flex;justify-content:space-between;margin-bottom:10px;align-items:center}
.score-big{font-size:34px;font-weight:900;flex-shrink:0}
.score-feedback{margin:0;font-size:13px;line-height:1.6;color:#cbd5e1}
.score-row{display:flex;gap:14px;align-items:flex-start;margin-bottom:12px}
</style>
</head>
<body>

<!-- API Key overlay -->
<div id="overlay">
  <div id="api-box">
    <h1>🐍 PyAnalytics</h1>
    <p style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#64748b;margin-bottom:16px">AI Interview Coach</p>
    <p>Enter your Anthropic API key to start.<br>It lives only in this browser tab.</p>
    <div id="api-err">⚠ Key must start with sk-ant-…</div>
    <input id="api-key-input" type="password" placeholder="sk-ant-api03-…" autocomplete="off"/>
    <button id="api-start-btn">Start Practising →</button>
    <p id="api-note">Stored in <code>sessionStorage</code> — cleared when you close the tab.<br/>
    Get a key at <a href="https://console.anthropic.com" target="_blank" rel="noopener">console.anthropic.com</a></p>
  </div>
</div>

<div id="app"></div>

<script>
// ── API key gate ──────────────────────────────────────────────────────────────
let API_KEY = sessionStorage.getItem('pya_key') || '';
const overlay = document.getElementById('overlay');
const keyInput = document.getElementById('api-key-input');
const apiErr   = document.getElementById('api-err');

function launchApp(k){
  API_KEY = k;
  sessionStorage.setItem('pya_key', k);
  overlay.style.display = 'none';
  renderHome();
}
if(API_KEY.startsWith('sk-')) launchApp(API_KEY);

document.getElementById('api-start-btn').onclick = () => {
  const k = keyInput.value.trim();
  if(!k.startsWith('sk-')){ apiErr.style.display='block'; keyInput.style.borderColor='#ef4444'; return; }
  launchApp(k);
};
keyInput.addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('api-start-btn').click(); });

// ── Constants ─────────────────────────────────────────────────────────────────
const LEVELS = ['Easy','Medium','Hard','Expert'];
const LEVEL_CLASS = {Easy:'easy',Medium:'medium',Hard:'hard',Expert:'expert'};
const LEVEL_COLOR = {Easy:'#10b981',Medium:'#f59e0b',Hard:'#ef4444',Expert:'#8b5cf6'};
const TOPICS = [
  'NumPy arrays & vectorisation',
  'Pandas DataFrames & Series',
  'Data cleaning & missing values',
  'GroupBy, pivot & merge',
  'Matplotlib & Seaborn visualisation',
  'Statistical analysis & hypothesis testing',
  'Feature engineering',
  'Scikit-learn ML pipelines',
  'Time-series analysis',
  'Performance optimisation & big data',
];

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  level: 'Easy', topic: TOPICS[0],
  question: null, evaluation: null,
  showSol: false, solOut: null,
  userCode: '', userOut: null,
  scores: [], prevQs: [], qCount: 0,
  loading: false, running: false, pyReady: false,
  screen: 'home', errMsg: '',
};

// ── Pyodide ───────────────────────────────────────────────────────────────────
let pyodide = null;
(async function loadPy(){
  try {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js';
    document.head.appendChild(s);
    s.onload = async () => {
      pyodide = await loadPyodide();
      state.pyReady = true;
      patch('py-status','⚡ Code runner ready');
    };
  } catch(e){}
})();

async function runPy(code){
  if(!pyodide) return {result:'',error:'Python runtime not loaded yet. Please wait a moment.'};
  try {
    pyodide.runPython(`import sys,io\n_o=sys.stdout\nsys.stdout=io.StringIO()`);
    let result='',error='';
    try {
      const v = pyodide.runPython(code);
      const cap = pyodide.runPython('sys.stdout.getvalue()');
      result = cap || (v!=null ? String(v) : '(no output)');
    } catch(e){ error=String(e); }
    finally { pyodide.runPython('sys.stdout=_o'); }
    return {result,error};
  } catch(e){ return {result:'',error:String(e)}; }
}

// ── Claude API ────────────────────────────────────────────────────────────────
async function askClaude(messages, system){
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': API_KEY,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body: JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system,messages}),
  });
  const d = await res.json();
  if(d.error) throw new Error(d.error.message);
  return d.content?.[0]?.text || '';
}

async function generateQuestion(){
  const prevStr = state.prevQs.length
    ? `Already asked: ${state.prevQs.slice(-3).join(' | ')}. Ask something different.` : '';
  const sys = `You are a Python Data Analytics interview expert. Output STRICT JSON only — no markdown, no backticks:
{"question":"...","hint":"one short hint","correct_code":"runnable standalone Python 3-15 lines with inline comments","explanation":"2-3 sentences on the concept tested","key_concept":"short tag"}`;
  const raw = await askClaude(
    [{role:'user',content:`Level: ${state.level}. Topic: ${state.topic}.\n${prevStr}\nGenerate a realistic interview question. correct_code must import libs and create its own sample data.`}],
    sys
  );
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

async function evaluateAnswer(ans){
  const sys = `You are a Python Data Analytics evaluator. Output STRICT JSON only:
{"score":0-100,"verdict":"Correct OR Partially Correct OR Incorrect","feedback":"2-3 sentences","improvement":"one actionable tip"}`;
  const raw = await askClaude(
    [{role:'user',content:`Question: ${state.question.question}\nAnswer: ${ans}\nLevel: ${state.level}`}],
    sys
  );
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const app = () => document.getElementById('app');
function patch(id, html){ const el=document.getElementById(id); if(el) el.innerHTML=html; }
function val(id){ const el=document.getElementById(id); return el?el.value:''; }

function heatBar(){
  const lvlIdx = LEVELS.indexOf(state.level);
  const cls = LEVEL_CLASS[state.level];
  return `<div class="heat">${LEVELS.map((_,i)=>`<div class="heat-seg ${i<=lvlIdx?'on-'+cls:''}"></div>`).join('')}</div>`;
}

function pillForLevel(l){
  return `<span class="pill pill-${l==='Easy'?'green':l==='Medium'?'yellow':l==='Hard'?'red':'purple'}">${l}</span>`;
}

function verdictPill(v){
  const c = v==='Correct'?'green':v==='Partially Correct'?'yellow':'red';
  return `<span class="pill pill-${c}">${v}</span>`;
}

function spinner(){ return `<div class="spinner-wrap"><div class="spinner"></div><div class="spinner-txt">Thinking…</div></div>`; }

function scoreColor(s){ return s>=80?'#10b981':s>=50?'#f59e0b':'#ef4444'; }

// ── Render: HOME ──────────────────────────────────────────────────────────────
function renderHome(){
  state.screen='home';
  const lvlIdx = LEVELS.indexOf(state.level);
  const avg = state.scores.length ? Math.round(state.scores.reduce((a,b)=>a+b,0)/state.scores.length) : 0;
  const topicOptions = TOPICS.map(t=>`<option${t===state.topic?' selected':''}>${t}</option>`).join('');
  const lvlBtns = LEVELS.map(l=>{
    const active = l===state.level;
    const cls = `lvl-${LEVEL_CLASS[l]}${active?'':' ghost'}`;
    return `<button class="${cls}" onclick="setLevel('${l}')">${l}</button>`;
  }).join('');

  const statsHtml = state.scores.length ? `
    <div class="panel stats-row">
      <div><div class="stat-num" style="color:#22d3ee">${state.qCount}</div><div class="stat-lbl">Asked</div></div>
      <div><div class="stat-num" style="color:${avg>=70?'#10b981':'#f59e0b'}">${avg}%</div><div class="stat-lbl">Avg</div></div>
      <div><div class="stat-num" style="color:${LEVEL_COLOR[state.level]}">${state.level}</div><div class="stat-lbl">Level</div></div>
    </div>` : '';

  const extraBtns = state.scores.length ? `
    <div class="btn-row" style="margin-top:10px">
      <button class="btn-ghost-cyan2" onclick="renderSummary()">Summary</button>
      <button class="btn-ghost-gray" onclick="resetAll()">Reset</button>
    </div>` : '';

  const errHtml = state.errMsg ? `<div class="err-box">${state.errMsg}</div>` : '';

  app().innerHTML = `
    <div class="hdr">
      <div class="logo">🐍 PyAnalytics</div>
      <div class="sub">AI Interview Coach</div>
    </div>
    <div class="card">
      <div class="panel">
        <span class="lbl">Difficulty</span>
        ${heatBar()}
        <div class="lvl-btns">${lvlBtns}</div>
      </div>
      <div class="panel">
        <span class="lbl">Topic</span>
        <select id="topic-sel" onchange="state.topic=this.value">${topicOptions}</select>
      </div>
      ${statsHtml}
      ${errHtml}
      <button class="btn-primary" onclick="startQuiz()">✦ Start Question</button>
      ${extraBtns}
      <p style="text-align:center;font-size:11px;color:#334155;margin-top:12px" id="py-status">
        ${state.pyReady?'⚡ Code runner ready':'⏳ Loading Python runtime…'}
      </p>
    </div>`;
}

function setLevel(l){ state.level=l; renderHome(); }

// ── Render: QUIZ ──────────────────────────────────────────────────────────────
function renderQuiz(){
  const q = state.question;
  const ev = state.evaluation;

  let html = `
    <div class="hdr">
      <div class="quiz-hdr-row">
        <button class="back-btn" onclick="renderHome()">←</button>
        <div class="logo">🐍 PyAnalytics</div>
        ${pillForLevel(state.level)}
      </div>
      ${heatBar()}
    </div>
    <div class="card">`;

  if(state.errMsg) html += `<div class="err-box">${state.errMsg}</div>`;
  if(state.loading && !q) html += spinner();

  if(q){
    // Question
    html += `<div class="panel">
      <div class="q-meta">
        <span class="lbl" style="margin:0">Q #${state.qCount}</span>
        <span class="pill pill-indigo">${q.key_concept}</span>
      </div>
      <p style="font-size:15px;line-height:1.65;color:#e2e8f0;margin:0">${q.question}</p>
      ${!ev?`<div class="hint-box">💡 ${q.hint}</div>`:''}
    </div>`;

    // Answer input
    if(!ev){
      html += `<div class="panel">
        <span class="lbl">Your Answer</span>
        <textarea id="user-ans" rows="5" placeholder="Explain concept, describe approach, or write code…"></textarea>
        <button class="btn-primary" style="margin-top:10px" onclick="submitAnswer()" id="submit-btn">Submit Answer →</button>
      </div>`;
    }

    if(state.loading && !ev) html += spinner();

    // Evaluation
    if(ev){
      html += `<div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span class="lbl" style="margin:0">Result</span>
          ${verdictPill(ev.verdict)}
        </div>
        <div class="score-row">
          <div class="score-big" style="color:${scoreColor(ev.score)}">${ev.score}<span style="font-size:14px">%</span></div>
          <p class="score-feedback">${ev.feedback}</p>
        </div>
        <div class="tip-box">🎯 ${ev.improvement}</div>
      </div>`;

      // Run your code
      html += `<div class="panel">
        <span class="lbl">🧪 Run Your Code</span>
        <textarea id="user-code" rows="4" placeholder="Write Python here and run it…">${escHtml(state.userCode)}</textarea>
        <button class="btn-ghost-cyan" style="margin-top:8px" onclick="doRunUserCode()" ${state.running?'disabled':''}>
          ${state.running?'Running…':'▶ Run Code'}
        </button>
        ${state.userOut ? `<div class="${state.userOut.error?'out-err':'out-ok'}">${escHtml(state.userOut.error||state.userOut.result)}</div>` : ''}
      </div>`;

      // Solution
      html += `<div class="panel">
        <button class="btn-${state.showSol?'green':'btn-ghost-green'}" style="${state.showSol?'background:#10b981;border:none;color:#fff':''}" onclick="toggleSol()">
          ${state.showSol?'Hide Solution':'✦ Show Correct Solution'}
        </button>
        ${state.showSol ? `
          <div style="margin-top:14px">
            <span class="lbl">Explanation</span>
            <p style="font-size:13px;line-height:1.65;color:#cbd5e1;margin:0">${q.explanation}</p>
          </div>
          <div style="margin-top:14px">
            <span class="lbl">Correct Code</span>
            <pre class="code-block">${escHtml(q.correct_code)}</pre>
            <button class="btn-ghost-green" style="margin-top:8px" onclick="doRunSolCode()" ${state.running?'disabled':''}>
              ${state.running?'Running…':'▶ Run Solution'}
            </button>
            ${state.solOut ? `<div class="${state.solOut.error?'out-err':'out-ok'}">${escHtml(state.solOut.error||state.solOut.result)}</div>` : ''}
          </div>` : ''}
      </div>`;

      // Next / Summary
      html += `<div class="btn-row">
        <button class="btn-primary" style="flex:2" onclick="nextQuestion()">Next Question →</button>
        <button class="btn-ghost-gray" style="flex:1" onclick="renderSummary()">Summary</button>
      </div>`;
    }
  }

  html += `</div>`;
  app().innerHTML = html;
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Render: SUMMARY ───────────────────────────────────────────────────────────
function renderSummary(){
  state.screen='summary';
  const avg = state.scores.length ? Math.round(state.scores.reduce((a,b)=>a+b,0)/state.scores.length) : 0;
  const correct  = state.scores.filter(s=>s>=80).length;
  const partial  = state.scores.filter(s=>s>=50&&s<80).length;
  const review   = state.scores.filter(s=>s<50).length;
  const msg = avg>=80?'🚀 Excellent! Ready for expert-level.':avg>=60?'💪 Good progress! Practice edge cases.':'📚 Keep going! Revisit fundamentals.';

  const bars = state.scores.map((s,i)=>{
    const c = scoreColor(s);
    const h = Math.max(6,(s/100)*48);
    return `<div class="score-bar" style="background:${c};height:${h}px" title="Q${i+1}: ${s}%"></div>`;
  }).join('');

  app().innerHTML = `
    <div class="hdr">
      <div class="logo">🐍 PyAnalytics</div>
      <div class="sub">Session Summary</div>
    </div>
    <div class="card">
      <div class="panel">
        <div style="text-align:center;margin-bottom:20px">
          <div style="font-size:54px;font-weight:900;background:linear-gradient(90deg,#22d3ee,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${avg}%</div>
          <div style="color:#64748b;font-size:13px">Average · ${state.qCount} Questions</div>
        </div>
        <div style="display:flex;justify-content:space-around;margin-bottom:18px">
          <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:#10b981">${correct}</div><div style="font-size:11px;color:#64748b">Correct</div></div>
          <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:#f59e0b">${partial}</div><div style="font-size:11px;color:#64748b">Partial</div></div>
          <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:#ef4444">${review}</div><div style="font-size:11px;color:#64748b">Review</div></div>
        </div>
        ${state.scores.length?`<span class="lbl">Score History</span><div class="score-bars">${bars}</div>`:''}
        <div class="info-box" style="margin-top:14px">${msg}</div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" style="flex:2" onclick="nextQuestion()">Continue →</button>
        <button class="btn-ghost-red" style="flex:1" onclick="resetAll()">Reset</button>
      </div>
    </div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function startQuiz(){
  state.errMsg=''; state.loading=true; state.question=null;
  state.evaluation=null; state.showSol=false; state.solOut=null;
  state.userCode=''; state.userOut=null;
  state.screen='quiz';
  renderQuiz();
  try {
    const q = await generateQuestion();
    state.question = q;
    state.prevQs = [...state.prevQs, q.question.slice(0,60)];
    state.qCount++;
  } catch(e){
    state.errMsg = '❌ ' + (e.message||String(e)) + ' — Check your API key.';
  }
  state.loading=false;
  renderQuiz();
}

async function submitAnswer(){
  const ans = val('user-ans');
  if(!ans.trim()) return;
  state.loading=true; renderQuiz();
  try {
    const ev = await evaluateAnswer(ans);
    state.evaluation = ev;
    state.scores = [...state.scores, ev.score];
    // auto level-up
    const rec = state.scores.slice(-2);
    const lvlIdx = LEVELS.indexOf(state.level);
    if(rec.length===2 && rec.every(s=>s>=80) && lvlIdx<LEVELS.length-1){
      state.level = LEVELS[lvlIdx+1];
    }
  } catch(e){ state.errMsg='❌ '+(e.message||String(e)); }
  state.loading=false; renderQuiz();
}

function toggleSol(){ state.showSol=!state.showSol; renderQuiz(); }

async function doRunUserCode(){
  state.userCode = val('user-code');
  if(!state.userCode.trim()) return;
  state.running=true; renderQuiz();
  state.userOut = await runPy(state.userCode);
  state.running=false; renderQuiz();
}

async function doRunSolCode(){
  state.running=true; renderQuiz();
  state.solOut = await runPy(state.question.correct_code);
  state.running=false; renderQuiz();
}

function nextQuestion(){
  state.question=null; state.evaluation=null; state.showSol=false;
  state.solOut=null; state.userCode=''; state.userOut=null; state.errMsg='';
  renderHome();
}

function resetAll(){
  state.scores=[]; state.prevQs=[]; state.qCount=0; state.level='Easy';
  state.question=null; state.evaluation=null; state.errMsg='';
  renderHome();
}
</script>
</body>
</html>
